theme = "pure_dark" # Full dark, high contrast, accessible

[editor]

line-number = "relative"
mouse = true # Useful for quick clicks, but Helix is very much keyboard-driven
cursorline = true
color-modes = true
bufferline = "multiple"
completion-trigger-len = 1
completion-replace = true
auto-pairs = true
idle-timeout = 200 # Faster updates (e.g. for LSP and diagnostics)
true-color = true

[editor.cursor-shape]
insert = "bar"
normal = "block"
select = "underline"

[editor.indent-guides]
render = true
character = "▏" 
skip-levels = 1

[editor.lsp]
display-messages = true
display-inlay-hints = true

[editor.statusline]
left = ["mode", "spinner"]
center = ["file-name"]
right = ["diagnostics", "selections", "position", "file-encoding", "file-line-ending", "file-type"]
mode.normal = "NORMAL"
mode.insert = "INSERT"
mode.select = "SELECT"

[keys.normal]
# Classic vim conveniences
esc = ["collapse_selection", "keep_primary_selection"]
"C-s" = ":w"
"C-q" = ":q"

# Paleta de comandos (ver comandos disponíveis)
"F1" = "command_palette"

# Easy jumping around
"C-h" = "jump_view_left"
"C-j" = "jump_view_down"
"C-k" = "jump_view_up"
"C-l" = "jump_view_right"

# Easy buffer/window switching
"]" = { b = "goto_next_buffer" }
"[" = { b = "goto_previous_buffer" }

[keys.insert]
"C-s" = ["normal_mode", ":w"]
